server:
  port: ${AIX_PORT:8080}
  address: ${AIX_BIND_ADDRESS:127.0.0.1}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force-request: true
      force-response: true

spring:
  application:
    name: ai-x
  datasource:
    url: jdbc:mysql://${AIX_MYSQL_HOST:127.0.0.1}:${AIX_MYSQL_PORT:3306}/${AIX_MYSQL_DB:aix}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${AIX_MYSQL_USER:root}
    password: ${AIX_MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    chat:
      model: openai
      embedding: openai
    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.7-plus
          temperature: 0.7
          max-tokens: 2048

      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024 # 需与模型支持维度、Milvus一致

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

aix:
  ingest:
    enabled: true
    auth-token: ${AIX_INGEST_TOKEN:}
    bind-address: ${AIX_BIND_ADDRESS:127.0.0.1}
    port: ${AIX_PORT:8080}
  rag:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.aix: INFO
